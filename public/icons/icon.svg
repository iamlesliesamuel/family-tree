<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#09090b"/>

  <!-- Tree structure -->
  <!-- Root person (top) -->
  <circle cx="256" cy="104" r="36" fill="#f59e0b" opacity="0.9"/>

  <!-- Vertical stem down from root -->
  <rect x="252" y="140" width="8" height="48" rx="4" fill="#52525b"/>

  <!-- Horizontal branch -->
  <rect x="156" y="184" width="200" height="8" rx="4" fill="#52525b"/>

  <!-- Left branch down -->
  <rect x="156" y="192" width="8" height="48" rx="4" fill="#52525b"/>

  <!-- Right branch down -->
  <rect x="348" y="192" width="8" height="48" rx="4" fill="#52525b"/>

  <!-- Left person -->
  <circle cx="160" cy="276" r="30" fill="#d97706" opacity="0.8"/>

  <!-- Right person -->
  <circle cx="352" cy="276" r="30" fill="#d97706" opacity="0.8"/>

  <!-- Left child stem -->
  <rect x="156" y="306" width="8" height="40" rx="4" fill="#52525b"/>

  <!-- Right child stem -->
  <rect x="348" y="306" width="8" height="40" rx="4" fill="#52525b"/>

  <!-- Left grandchild horizontal -->
  <rect x="110" y="342" width="104" height="8" rx="4" fill="#52525b"/>

  <!-- Right grandchild horizontal -->
  <rect x="302" y="342" width="104" height="8" rx="4" fill="#52525b"/>

  <!-- Left grandchildren -->
  <rect x="110" y="350" width="8" height="32" rx="4" fill="#52525b"/>
  <rect x="206" y="350" width="8" height="32" rx="4" fill="#52525b"/>
  <circle cx="114" cy="400" r="22" fill="#92400e" opacity="0.7"/>
  <circle cx="210" cy="400" r="22" fill="#92400e" opacity="0.7"/>

  <!-- Right grandchildren -->
  <rect x="302" y="350" width="8" height="32" rx="4" fill="#52525b"/>
  <rect x="398" y="350" width="8" height="32" rx="4" fill="#52525b"/>
  <circle cx="306" cy="400" r="22" fill="#92400e" opacity="0.7"/>
  <circle cx="402" cy="400" r="22" fill="#92400e" opacity="0.7"/>
</svg>
